U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Oswald';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"2642ded1-e35f-4dc1-9389-0d4e8b897fef\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n\n\n\n<style>\n  /* ============ VAI BRAND TOKENS ============ */\n  :root {\n    --bg: #060608;\n    --card: #0c0c10;\n    --elev: #141418;\n    --surface: #1a1a20;\n    --border: #1e1e26;\n    --border-soft: #15151c;\n    --hairline: #25252e;\n\n    --orange: #F7941E;\n    --orange-deep: #C66F0F;\n    --green: #34D399;\n    --green-deep: #0D4A28;\n    --gold: #f3d7b5;\n    --yellow: #FBBF24;\n    --red: #FF6B6B;\n    --blue: #5577DD;\n\n    --orange-bg: #1E1000;\n    --green-bg: #051A10;\n    --yellow-bg: #1A1000;\n    --red-bg: #1A0808;\n\n    --text: #F5F0EB;\n    --text-2: #C8C8D0;\n    --muted: #8888A0;\n    --faint: #4d4d60;\n\n    --display: 'Oswald', system-ui, sans-serif;\n    --body: 'DM Sans', system-ui, sans-serif;\n    --mono: 'JetBrains Mono', ui-monospace, monospace;\n  }\n  html, body { margin: 0; background: var(--bg); color: var(--text); font-family: var(--body); -webkit-font-smoothing: antialiased; }\n\n  deck-stage { --slide-bg: var(--bg); }\n\n  /* ============ SLIDE FRAME ============ */\n  .slide {\n    width: 1920px; height: 1080px;\n    background: var(--bg); color: var(--text);\n    position: relative; overflow: hidden;\n    font-family: var(--body);\n  }\n  .slide::before {\n    /* subtle warm grain */\n    content: ''; position: absolute; inset: 0;\n    background:\n      radial-gradient(circle at 18% 12%, rgba(247,148,30,0.06), transparent 38%),\n      radial-gradient(circle at 84% 88%, rgba(52,211,153,0.05), transparent 42%);\n    pointer-events: none; z-index: 0;\n  }\n\n  /* ============ HEADER / FOOTER CHROME ============ */\n  .chrome-top {\n    position: absolute; top: 0; left: 0; right: 0;\n    display: flex; align-items: center; justify-content: space-between;\n    padding: 40px 72px 0; z-index: 2;\n  }\n  .chrome-bot {\n    position: absolute; bottom: 0; left: 0; right: 0;\n    display: flex; align-items: flex-end; justify-content: space-between;\n    padding: 0 72px 36px; z-index: 2;\n    border-top: 1px solid var(--border-soft);\n  }\n  .chrome-bot-inner {\n    width: 100%; padding-top: 18px;\n    display: flex; align-items: center; justify-content: space-between;\n  }\n  .wing-mark { display: flex; align-items: center; gap: 14px; }\n  .wing-mark svg { width: 54px; height: auto; display: block; }\n  .wing-mark .wm-rule { width: 1px; height: 28px; background: var(--hairline); }\n  .wing-mark .wm-tag {\n    font-family: var(--mono); font-size: 18px; font-weight: 600;\n    color: var(--muted); letter-spacing: 0.16em; text-transform: uppercase;\n  }\n  .wing-mark .wm-tag em { font-style: normal; color: var(--orange); }\n\n  .slide-num {\n    font-family: var(--mono); font-weight: 600; font-size: 18px;\n    color: var(--muted); letter-spacing: 0.14em; text-transform: uppercase;\n    display: flex; align-items: center; gap: 14px;\n  }\n  .slide-num .roman {\n    color: var(--orange); font-weight: 700;\n  }\n  .slide-num .pip { width: 8px; height: 8px; border-radius: 999px; background: var(--orange); box-shadow: 0 0 16px 2px rgba(247,148,30,0.5); }\n\n  .foot-l, .foot-r {\n    font-family: var(--mono); font-size: 19px; font-weight: 500;\n    color: var(--muted); letter-spacing: 0.16em; text-transform: uppercase;\n  }\n  .foot-l .accent { color: var(--text); font-weight: 600; }\n\n  /* ============ TYPE PRIMITIVES ============ */\n  .eyebrow {\n    font-family: var(--mono); font-size: 20px; font-weight: 600;\n    color: var(--muted); letter-spacing: 0.22em; text-transform: uppercase;\n  }\n  .eyebrow .dot {\n    display: inline-block; width: 6px; height: 6px; border-radius: 999px;\n    background: var(--orange); margin-right: 12px; transform: translateY(-2px);\n  }\n  .eyebrow.green .dot { background: var(--green); box-shadow: 0 0 10px var(--green); }\n\n  .h-display {\n    font-family: var(--display); font-weight: 600;\n    color: var(--text); line-height: 1.08; letter-spacing: -0.005em;\n  }\n  .h-display em { font-style: normal; color: var(--orange); font-weight: 700; }\n  .h-display .g { color: var(--green); font-style: normal; }\n  .h-display .strike { color: var(--muted); font-weight: 400; }\n\n  .lede {\n    font-family: var(--body); color: var(--text-2);\n    font-size: 24px; line-height: 1.42; font-weight: 400; max-width: 1100px;\n  }\n\n  .mono-cap {\n    font-family: var(--mono); font-size: 19px; font-weight: 600;\n    color: var(--muted); letter-spacing: 0.16em; text-transform: uppercase;\n  }\n\n  /* ============ STAT PRIMITIVE ============ */\n  .stat-num {\n    font-family: var(--display); font-weight: 600; color: var(--text);\n    line-height: 0.9; letter-spacing: -0.01em;\n  }\n  .stat-num .unit { color: var(--orange); font-weight: 700; }\n  .stat-num .g    { color: var(--green); font-weight: 700; }\n\n  /* ============ CARDS ============ */\n  .card {\n    background: var(--card); border: 1px solid var(--border);\n    border-radius: 14px; padding: 28px 32px;\n  }\n  .card.accent-l { border-left: 3px solid var(--orange); }\n  .card.accent-g { border-left: 3px solid var(--green); }\n  .card.accent-y { border-left: 3px solid var(--yellow); }\n\n  /* ============ STATUS PILL ============ */\n  .pill {\n    display: inline-flex; align-items: center; gap: 9px;\n    font-family: var(--mono); font-size: 15px; font-weight: 700;\n    letter-spacing: 0.14em; text-transform: uppercase;\n    padding: 8px 16px; border-radius: 999px;\n    background: var(--green-bg); border: 1px solid var(--green-deep); color: var(--green);\n  }\n  .pil
