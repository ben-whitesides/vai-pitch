<!doctype html>
<html lang="en"><head>
<meta charset="utf-8" />
<title>VAI Game OS preview</title>
<link rel="stylesheet" href="../styles.css" />
<style>html,body{margin:0;background:#060608;overflow:hidden;}#root{width:1440px;height:900px;}</style>
</head><body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="../icons.jsx"></script>
<script type="text/babel" src="../game-os-redesign.jsx"></script>
<script type="text/babel">
const { ConceptA, ConceptB, ConceptC } = window;
const v = new URLSearchParams(location.search).get('v') || 'a';
const Cmp = v === 'b' ? ConceptB : v === 'c' ? ConceptC : ConceptA;
ReactDOM.createRoot(document.getElementById('root')).render(
  <div style={{ width: 1440, height: 900, overflow: 'hidden', background: '#060608' }}>
    <Cmp />
  </div>
);
</script>
</body></html>
